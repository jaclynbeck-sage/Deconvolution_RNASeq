default:
  # Used to create params_loop1 (data-specific arguments) in main function
  reference_input_type: "singlecell"
  normalization: ["cpm", "tmm"] #tpm # Scaden works on linear-scale data

  # For params_loop2 (algorithm-specific arguments) in main function
  marker_function: "CreateParams_FilterableSignature"
  params_markers:
    filter_levels: 0 # this produces one row with filter = 0 since this alg doesn't use markers
  additional_args:
    n_cells: [100, 500, 1000]

  # Define the function that runs each param set
  inner_loop_file: !expr file.path("functions", "Step08_Scaden_InnerLoop.R")
  inner_loop_func: "Scaden_InnerLoop" # must be a string

  # Whether to run only Control and AD samples, or run all samples.
  ct_ad_only: false

  # How many cores to use in parallel
  cores: 1 # Scaden uses so much memory and disk space that it can't run in parallel
