default:
  # Used to create params_loop1 (data-specific arguments) in main function
  reference_input_type: "signature" # DWLS uses a signature matrix
  normalization: ["cpm", "tmm", "tpm"] # DWLS works on linear data

  # For params_loop2 (algorithm-specific arguments) in main function
  marker_function: "CreateParams_FilterableSignature"
  params_markers:
    filter_levels: 3
  additional_args:
    solver_type: ["DampenedWLS", "SVR"]

  # Define the function that runs each param set
  inner_loop_file: !expr file.path("functions", "Step08_SignatureBased_InnerLoop.R")
  inner_loop_func: "SignatureBased_InnerLoop" # must be a string

  # Whether to run only Control and AD samples, or run all samples.
  ct_ad_only: false

  # How many cores to use in parallel -- DWLS multi-threads a little so we don't use all cores
  cores: !expr round(parallel::detectCores() * 0.5)
